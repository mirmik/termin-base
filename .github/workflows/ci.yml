name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

env:
  LD_LIBRARY_PATH: /opt/termin/lib

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip setuptools wheel nanobind pytest

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/opt/termin -DTERMIN_BASE_BUILD_TESTS=ON -DTCBASE_BUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Install to /opt/termin
        run: sudo cmake --install build

      - name: Run C/C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Install tcbase package
        run: python -m pip install --no-build-isolation .

      - name: Run Python tests
        run: python -m pytest -q tests/python
